backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "vendors"
    label: "Vendors"
    folder: "_vendors"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Vendor Name", name: "title", widget: "string" }
      - { label: "Vendor Description", name: "body", widget: "markdown" }
      - { label: "Vendor Photo", name: "image", widget: "image" }
      - { label: "Show on Homepage", name: "featured", widget: "boolean", default: false, required: false }

  - name: "pages"
    label: "Website Content"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content/homepage.json"
        format: "json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Hero Description", name: "hero_description", widget: "text" }
          - { label: "Button Text", name: "button_text", widget: "string" }
          - { label: "Button Link", name: "button_link", widget: "string" }
          - { label: "Manager Name", name: "manager_name", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Hero Image", name: "hero_image", widget: "image" }

      - label: "About the Market"
        name: "about"
        file: "content/about.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "About Description", name: "description", widget: "text" }

      - label: "Vendor Pricing"
        name: "pricing"
        file: "content/pricing.json"
        format: "json"
        fields:
          - { label: "10×10 Vendor Space", name: "outside_vendor", widget: "string" }
          - { label: "Weekend Vendor Price", name: "weekend_vendor", widget: "string" }
          - { label: "Food Truck Price", name: "food_truck", widget: "string" }
          - { label: "Electricity Price", name: "electricity", widget: "string" }
          - { label: "Table Rental", name: "table", widget: "string" }
          - { label: "Tent Rental", name: "tent", widget: "string" }
          - { label: "Extension Cord Rental", name: "extension_cord", widget: "string" }
          - { label: "Chair Rental", name: "chair", widget: "string" }
          - { label: "Vendor Special", name: "special", widget: "text" }

      - label: "Featured Vendors"
        name: "featured_vendors"
        file: "content/featured-vendors.json"
        format: "json"
        fields:
          - label: "Featured Vendor List"
            name: "vendors"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Vendor Name", name: "name", widget: "string" }
              - { label: "Vendor Description", name: "description", widget: "text" }
              - { label: "Vendor Photo", name: "image", widget: "image" }
